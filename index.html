<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamPulse | Gamified Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700&display=swap');
        
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(124, 58, 237, 0.5); } 50% { box-shadow: 0 0 40px rgba(124, 58, 237, 0.8); } }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-scale-in { animation: scaleIn 0.3s ease-out; }
        .animate-pulse-once { animation: pulse 0.6s ease-out; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-glow { animation: glow 2s ease-in-out infinite; }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .trophy-gold { color: #FFD700; filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.6)); }
        .trophy-silver { color: #C0C0C0; filter: drop-shadow(0 0 8px rgba(192, 192, 192, 0.6)); }
        .trophy-bronze { color: #CD7F32; filter: drop-shadow(0 0 8px rgba(205, 127, 50, 0.6)); }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, memo, useCallback } = React;

        const confettiCelebration = (origin = { x: 0.5, y: 0.5 }) => {
            const count = 200;
            const defaults = { origin, spread: 360, ticks: 100, gravity: 1, decay: 0.94, startVelocity: 30, colors: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b'] };
            
            function shoot() {
                confetti({ ...defaults, particleCount: Math.floor(count * 0.25), scalar: 1.2, shapes: ['star'] });
                confetti({ ...defaults, particleCount: Math.floor(count * 0.2), scalar: 0.75, shapes: ['circle'] });
                confetti({ ...defaults, particleCount: Math.floor(count * 0.35), scalar: 1, shapes: ['square'] });
            }
            
            setTimeout(shoot, 0);
            setTimeout(shoot, 100);
            setTimeout(shoot, 200);
        };

        const initFirebaseInstance = (config) => {
            if (!firebase.apps.length) firebase.initializeApp(config);
            return { auth: firebase.auth(), db: firebase.firestore() };
        };

        const Icon = memo(({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({ attrs: { size, class: className }, nameAttr: 'data-lucide' });
                }
            }, [name, size, className]);
            return <i data-lucide={name} ref={iconRef}></i>;
        });

        const ACHIEVEMENTS = [
            { id: 'first_point', name: 'First Steps', desc: 'Award your first point', icon: 'star', color: 'blue', threshold: 1 },
            { id: 'ten_points', name: 'Getting Started', desc: 'Award 10 points total', icon: 'trending-up', color: 'green', threshold: 10 },
            { id: 'fifty_points', name: 'Team Builder', desc: 'Award 50 points total', icon: 'users', color: 'purple', threshold: 50 },
            { id: 'hundred_points', name: 'Master Motivator', desc: 'Award 100 points total', icon: 'zap', color: 'yellow', threshold: 100 },
            { id: 'five_employees', name: 'Growing Team', desc: 'Add 5 team members', icon: 'user-plus', color: 'pink', threshold: 5 },
        ];

        const getAchievementColor = (color) => {
            const colors = {
                blue: 'from-blue-400 to-blue-600',
                green: 'from-green-400 to-green-600',
                purple: 'from-purple-400 to-purple-600',
                yellow: 'from-yellow-400 to-yellow-600',
                pink: 'from-pink-400 to-pink-600',
            };
            return colors[color] || colors.blue;
        };

        const AchievementBadge = ({ achievement, unlocked, progress }) => (
            <div className={`relative p-4 rounded-xl border-2 transition-all ${unlocked ? 'glass border-white shadow-xl' : 'bg-gray-100 border-gray-300 opacity-60'}`}>
                <div className={`w-12 h-12 rounded-full bg-gradient-to-br ${getAchievementColor(achievement.color)} flex items-center justify-center mb-2 mx-auto ${unlocked ? 'animate-pulse-once' : 'grayscale'}`}>
                    <Icon name={achievement.icon} size={24} className="text-white" />
                </div>
                <h4 className="font-bold text-xs text-center text-gray-800">{achievement.name}</h4>
                <p className="text-[10px] text-gray-500 text-center mt-1">{achievement.desc}</p>
                {!unlocked && progress !== undefined && (
                    <div className="mt-2">
                        <div className="w-full bg-gray-200 rounded-full h-1.5">
                            <div className="bg-gradient-to-r from-purple-500 to-pink-500 h-1.5 rounded-full transition-all" style={{ width: `${Math.min(100, (progress / achievement.threshold) * 100)}%` }}></div>
                        </div>
                        <p className="text-[9px] text-gray-400 text-center mt-1">{progress}/{achievement.threshold}</p>
                    </div>
                )}
                {unlocked && <div className="absolute -top-2 -right-2 bg-yellow-400 rounded-full p-1 shadow-lg"><Icon name="check" size={12} className="text-yellow-900" /></div>}
            </div>
        );

        const ProfileTrendChart = memo(({ data }) => {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            
            useEffect(() => {
                if (!canvasRef.current || !data || data.length === 0) return;
                
                const ctx = canvasRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();
                
                const gradient = ctx.createLinearGradient(0, 0, 0, 180);
                gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
                gradient.addColorStop(1, 'rgba(102, 126, 234, 0.01)');
                
                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.date),
                        datasets: [{ 
                            label: 'Points', 
                            data: data.map(d => d.total), 
                            borderColor: '#667eea',
                            borderWidth: 3,
                            tension: 0.4, 
                            fill: true, 
                            backgroundColor: gradient,
                            pointBackgroundColor: '#667eea',
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            pointBorderWidth: 2,
                            pointBorderColor: '#fff'
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                padding: 12,
                                cornerRadius: 8,
                            }
                        },
                        scales: { 
                            y: { 
                                beginAtZero: true,
                                grid: { color: 'rgba(0, 0, 0, 0.05)' },
                            }, 
                            x: { 
                                grid: { display: false },
                            } 
                        },
                        animation: { duration: 1000, easing: 'easeOutQuart' }
                    }
                });

                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [data]);

            return <div className="h-[200px] w-full"><canvas ref={canvasRef}></canvas></div>;
        });

        const LeaderboardChart = memo(({ data }) => {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            
            useEffect(() => {
                if (!canvasRef.current || !data || data.length === 0) return;
                
                const ctx = canvasRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();
                
                chartInstance.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.name),
                        datasets: [{ 
                            label: 'Score', 
                            data: data.map(d => d.score), 
                            backgroundColor: data.map((d, i) => {
                                if (i === 0) return 'rgba(255, 215, 0, 0.8)';
                                if (i === 1) return 'rgba(192, 192, 192, 0.8)';
                                if (i === 2) return 'rgba(205, 127, 50, 0.8)';
                                return d.score >= 0 ? 'rgba(102, 126, 234, 0.8)' : 'rgba(239, 68, 68, 0.8)';
                            }),
                            borderRadius: 8,
                            borderWidth: 2,
                            borderColor: data.map((d, i) => {
                                if (i === 0) return '#FFD700';
                                if (i === 1) return '#C0C0C0';
                                if (i === 2) return '#CD7F32';
                                return d.score >= 0 ? '#667eea' : '#ef4444';
                            })
                        }]
                    },
                    options: { 
                        indexAxis: 'y', 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } },
                        scales: { x: { grid: { color: 'rgba(0, 0, 0, 0.05)' } } },
                        animation: { duration: 1200, easing: 'easeOutQuart' }
                    }
                });

                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [data]);

            return <div className="h-[350px] w-full"><canvas ref={canvasRef}></canvas></div>;
        });

        const StatCard = ({ icon, label, value, color }) => (
            <div className="glass rounded-2xl p-6 border border-white shadow-xl animate-fade-in hover:scale-105 transition-transform">
                <div className="flex items-start justify-between mb-3">
                    <div className={`p-3 rounded-xl bg-gradient-to-br ${color} shadow-lg`}>
                        <Icon name={icon} size={24} className="text-white" />
                    </div>
                </div>
                <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">{label}</p>
                <h3 className="text-3xl font-black font-display gradient-text">{value}</h3>
            </div>
        );
        const App = () => {
            const [user, setUser] = useState(null);
            const [status, setStatus] = useState('initializing'); 
            const [activeTab, setActiveTab] = useState('dashboard');
            const [employees, setEmployees] = useState([]);
            const [reasons, setReasons] = useState([]);
            const [points, setPoints] = useState([]);
            const [logs, setLogs] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState(`${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`);
            const [selectedEmployeeId, setSelectedEmployeeId] = useState(null);
            const [achievements, setAchievements] = useState([]);
            const [showAchievement, setShowAchievement] = useState(null);

            const [empForm, setEmpForm] = useState("");
            const [reasonForm, setReasonForm] = useState({ text: "", value: 0 });
            const [pointForm, setPointForm] = useState({ empId: "", reasonId: "", admin: "", notes: "" });

            const appId = 'employee-dash-production';

            useEffect(() => {
                const config = {
                    apiKey: "AIzaSyDVxpbTHTvMCZR8tkbqVvUbhAKGTmSkL_g",
                    authDomain: "employee-dashboard-2.firebaseapp.com",
                    projectId: "employee-dashboard-2",
                    storageBucket: "employee-dashboard-2.firebasestorage.app",
                    messagingSenderId: "986398601231",
                    appId: "1:986398601231:web:1a6d9c9b171ea8236337a"
                };

                const setup = async () => {
                    const fb = initFirebaseInstance(config);
                    fb.auth.onAuthStateChanged(async (u) => {
                        if (u) {
                            setUser(u);
                            setStatus('ready');
                        } else {
                            try { await fb.auth.signInAnonymously(); } catch (e) { setStatus('error'); }
                        }
                    });
                };
                setup();
            }, []);

            useEffect(() => {
                if (!user) return;
                const db = firebase.firestore();
                const base = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubEmp = base.collection('employees').onSnapshot(s => setEmployees(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubRea = base.collection('reasons').onSnapshot(s => setReasons(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubPts = base.collection('points').onSnapshot(s => setPoints(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp?.seconds||0)-(a.timestamp?.seconds||0))));
                const unsubLog = base.collection('change_logs').onSnapshot(s => setLogs(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp?.seconds||0)-(a.timestamp?.seconds||0))));
                const unsubAch = base.collection('achievements').onSnapshot(s => setAchievements(s.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubEmp(); unsubRea(); unsubPts(); unsubLog(); unsubAch(); };
            }, [user]);

            const logAction = useCallback(async (action, details, admin) => {
                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('change_logs').add({
                    action, details, admin: admin || "Admin", timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }, [appId]);

            const checkAndUnlockAchievement = useCallback(async (achievementId) => {
                const existing = achievements.find(a => a.id === achievementId);
                if (existing) return;

                const achievement = ACHIEVEMENTS.find(a => a.id === achievementId);
                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('achievements').doc(achievementId).set({
                    unlockedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                setShowAchievement(achievement);
                confettiCelebration();
                setTimeout(() => setShowAchievement(null), 4000);
            }, [achievements, appId]);

            useEffect(() => {
                const totalPoints = points.length;
                const totalEmployees = employees.length;

                if (totalPoints >= 1 && !achievements.find(a => a.id === 'first_point')) checkAndUnlockAchievement('first_point');
                if (totalPoints >= 10 && !achievements.find(a => a.id === 'ten_points')) checkAndUnlockAchievement('ten_points');
                if (totalPoints >= 50 && !achievements.find(a => a.id === 'fifty_points')) checkAndUnlockAchievement('fifty_points');
                if (totalPoints >= 100 && !achievements.find(a => a.id === 'hundred_points')) checkAndUnlockAchievement('hundred_points');
                if (totalEmployees >= 5 && !achievements.find(a => a.id === 'five_employees')) checkAndUnlockAchievement('five_employees');
            }, [points, employees, achievements, checkAndUnlockAchievement]);

            const handleAssignPoint = useCallback(async (e, specificEmpId = null) => {
                if (e) e.preventDefault();
                const targetId = specificEmpId || pointForm.empId;
                const emp = employees.find(e => e.id === targetId);
                const reas = reasons.find(r => r.id === pointForm.reasonId);
                if (!emp || !reas) return;

                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('points').add({
                    employeeId: emp.id, employeeName: emp.name, reasonText: reas.text,
                    value: Number(reas.value), admin: pointForm.admin || "Admin", notes: pointForm.notes,
                    monthKey: selectedMonth, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                await logAction("Points Assigned", `${reas.value > 0 ? '+' : ''}${reas.value} to ${emp.name}`, pointForm.admin);
                
                if (reas.value > 0) {
                    confettiCelebration({ x: 0.5, y: 0.6 });
                }
                
                setPointForm(prev => ({ ...prev, reasonId: "", notes: "" }));
            }, [employees, reasons, pointForm, selectedMonth, logAction, appId]);

            const removePointEntry = useCallback(async (id, empName, val) => {
                if (!confirm(`Delete this ${val} pts interaction?`)) return;
                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('points').doc(id).delete();
                await logAction("Points Deleted", `Removed ${val} pts from ${empName}`, "Admin");
            }, [logAction, appId]);

            const leaderboard = useMemo(() => {
                const map = {};
                employees.forEach(e => map[e.id] = { name: e.name, score: 0 });
                points.filter(p => p.monthKey === selectedMonth).forEach(p => { if (map[p.employeeId]) map[p.employeeId].score += p.value; });
                return Object.values(map).sort((a,b) => b.score - a.score);
            }, [employees, points, selectedMonth]);

            const currentEmployee = useMemo(() => employees.find(e => e.id === selectedEmployeeId), [employees, selectedEmployeeId]);
            const currentHistory = useMemo(() => points.filter(p => p.employeeId === selectedEmployeeId), [points, selectedEmployeeId]);
            const currentTrends = useMemo(() => {
                const map = {};
                currentHistory.forEach(p => {
                    if (!p.timestamp) return;
                    const d = p.timestamp.toDate().toLocaleDateString();
                    map[d] = (map[d] || 0) + p.value;
                });
                return Object.entries(map).map(([date, total]) => ({ date, total })).slice(-14).reverse();
            }, [currentHistory]);

            const monthlyPositive = useMemo(() => points.filter(p => p.monthKey === selectedMonth && p.value > 0).reduce((a,b)=>a+b.value,0), [points, selectedMonth]);
            const monthlyNegative = useMemo(() => points.filter(p => p.monthKey === selectedMonth && p.value < 0).reduce((a,b)=>a+b.value,0), [points, selectedMonth]);
            const totalInteractions = useMemo(() => points.filter(p => p.monthKey === selectedMonth).length, [points, selectedMonth]);

            const currentStreak = useMemo(() => {
                const today = new Date();
                let streak = 0;
                for (let i = 0; i < 30; i++) {
                    const checkDate = new Date(today);
                    checkDate.setDate(checkDate.getDate() - i);
                    const dateStr = checkDate.toLocaleDateString();
                    const dayPoints = points.filter(p => p.timestamp && p.timestamp.toDate().toLocaleDateString() === dateStr);
                    if (dayPoints.length > 0 && dayPoints.every(p => p.value >= 0)) {
                        streak++;
                    } else if (i > 0) {
                        break;
                    }
                }
                return streak;
            }, [points]);

            if (status !== 'ready') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center text-white">
                        <div className="animate-float mb-6">
                            <div className="w-20 h-20 bg-white rounded-3xl flex items-center justify-center shadow-2xl">
                                <Icon name="zap" size={40} className="text-purple-600" />
                            </div>
                        </div>
                        <div className="w-16 h-16 border-4 border-white border-t-transparent rounded-full animate-spin mb-4"></div>
                        <h2 className="text-2xl font-black font-display">Loading TeamPulse...</h2>
                        <p className="text-purple-200 mt-2">Syncing your team data</p>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    {showAchievement && (
                        <div className="fixed inset-0 flex items-center justify-center z-50 pointer-events-none">
                            <div className="glass border-4 border-white rounded-3xl p-8 shadow-2xl animate-scale-in max-w-md">
                                <div className="text-center">
                                    <div className={`w-24 h-24 rounded-full bg-gradient-to-br ${getAchievementColor(showAchievement.color)} flex items-center justify-center mb-4 mx-auto animate-pulse-once shadow-2xl`}>
                                        <Icon name={showAchievement.icon} size={48} className="text-white" />
                                    </div>
                                    <h2 className="text-2xl font-black font-display mb-2 gradient-text">Achievement Unlocked!</h2>
                                    <h3 className="text-xl font-bold text-gray-800 mb-2">{showAchievement.name}</h3>
                                    <p className="text-gray-600">{showAchievement.desc}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <aside className="w-72 glass border-r border-white/20 flex flex-col p-6 shrink-0 shadow-2xl">
                        <div className="flex items-center gap-3 mb-8">
                            <div className="w-12 h-12 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-white shadow-xl animate-glow">
                                <Icon name="zap" size={28} />
                            </div>
                            <div>
                                <span className="text-xl font-black font-display gradient-text">TeamPulse</span>
                                <p className="text-[10px] text-purple-600 font-bold uppercase tracking-wider">Gamified Edition</p>
                            </div>
                        </div>

                        {currentStreak > 0 && (
                            <div className="mb-6 bg-gradient-to-r from-orange-400 to-red-500 rounded-2xl p-4 text-white shadow-lg">
                                <div className="flex items-center gap-3">
                                    <Icon name="flame" size={32} className="animate-pulse-once" />
                                    <div>
                                        <p className="text-xs font-bold opacity-90">Current Streak</p>
                                        <p className="text-2xl font-black font-display">{currentStreak} Days</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        <nav className="flex-1 space-y-2">
                            {[
                                {id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard', gradient: 'from-blue-500 to-purple-600'},
                                {id: 'leaderboard', label: 'Leaderboard', icon: 'trophy', gradient: 'from-yellow-400 to-orange-500'},
                                {id: 'assign', label: 'Assign Points', icon: 'plus-circle', gradient: 'from-green-400 to-emerald-600'},
                                {id: 'team', label: 'Team Members', icon: 'users', gradient: 'from-pink-500 to-rose-600'},
                                {id: 'achievements', label: 'Achievements', icon: 'award', gradient: 'from-purple-500 to-indigo-600'},
                                {id: 'settings', label: 'Point Library', icon: 'settings', gradient: 'from-gray-400 to-gray-600'},
                                {id: 'changelog', label: 'Activity Log', icon: 'history', gradient: 'from-cyan-400 to-blue-500'}
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 p-3 px-4 rounded-xl transition-all font-bold ${activeTab === item.id ? `bg-gradient-to-r ${item.gradient} text-white shadow-xl scale-105` : 'text-gray-600 hover:bg-white/50'}`}>
                                    <Icon name={item.icon} size={20} /><span className="text-sm">{item.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-6 pt-6 border-t border-gray-200">
                            <div className="text-xs text-gray-500 flex items-center gap-2">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                <span className="font-semibold">Live Sync Active</span>
                            </div>
                        </div>
                    </aside>

                                                    </div>
                                                    <span className="font-bold text-gray-800">{r.text}</span>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <span className={`text-2xl font-black font-display ${r.value >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                                        {r.value > 0 ? '+' : ''}{r.value}
                                                    </span>
                                                    <button onClick={() => firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('reasons').doc(r.id).delete()} className="text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-2 hover:bg-red-50 rounded-lg">
                                                        <Icon name="trash" size={18}/>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'changelog' && (
                                <div className="max-w-5xl mx-auto glass rounded-3xl border border-white shadow-xl overflow-hidden animate-fade-in">
                                    <div className="p-6 bg-gradient-to-r from-gray-50 to-slate-50 border-b-2 border-gray-100 flex justify-between items-center">
                                        <h3 className="font-black text-gray-800 text-lg">Activity Timeline</h3>
                                        <Icon name="activity" className="text-purple-600" size={24} />
                                    </div>
                                    <div className="divide-y divide-gray-100 max-h-[700px] overflow-y-auto custom-scrollbar">
                                        {logs.length === 0 ? 
                                            <div className="p-24 text-center text-gray-400 italic">
                                                <Icon name="inbox" size={64} className="mx-auto mb-4 opacity-20" />
                                                <p className="text-lg">No activity logged yet</p>
                                            </div> :
                                        logs.map(log => (
                                            <div key={log.id} className="p-6 flex justify-between items-center hover:bg-gradient-to-r hover:from-purple-50 hover:to-pink-50 transition-all group">
                                                <div className="flex items-center gap-5">
                                                    <div className={`p-3 rounded-xl ${log.action.includes('Assigned') ? 'bg-purple-100' : log.action.includes('Deleted') ? 'bg-red-100' : 'bg-gray-100'}`}>
                                                        <Icon name="activity" size={20} className={log.action.includes('Assigned') ? 'text-purple-600' : log.action.includes('Deleted') ? 'text-red-600' : 'text-gray-600'}/>
                                                    </div>
                                                    <div>
                                                        <p className="font-black text-gray-800 mb-1">{log.action}</p>
                                                        <p className="text-sm text-gray-600">{log.details}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-sm font-bold text-gray-700">{log.admin}</p>
                                                    <p className="text-xs text-gray-500 font-semibold">{log.timestamp?.toDate().toLocaleString() || 'Recording...'}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
