<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Points Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- FIREBASE INITIALIZATION HELPER ---
        const initFirebaseInstance = (config) => {
            if (!firebase.apps.length) {
                firebase.initializeApp(config);
            }
            return {
                auth: firebase.auth(),
                db: firebase.firestore()
            };
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({ attrs: { size, class: className }, nameAttr: 'data-lucide' });
                }
            }, [name, size, className]);
            return <i data-lucide={name} ref={iconRef}></i>;
        };

        // --- CHART COMPONENTS ---
        const TrendChart = ({ data }) => {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            useEffect(() => {
                if (!canvasRef.current || !data.length) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = canvasRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.date),
                        datasets: [{ 
                            label: 'Points', 
                            data: data.map(d => d.total), 
                            borderColor: '#4f46e5', 
                            tension: 0.3, 
                            fill: true, 
                            backgroundColor: 'rgba(79, 70, 229, 0.05)' 
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });
                return () => chartInstance.current?.destroy();
            }, [data]);
            return <div className="h-[250px] w-full"><canvas ref={canvasRef}></canvas></div>;
        };

        const LeaderboardChart = ({ data }) => {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            useEffect(() => {
                if (!canvasRef.current || !data.length) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = canvasRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.name),
                        datasets: [{ 
                            label: 'Score', 
                            data: data.map(d => d.score), 
                            backgroundColor: data.map(d => d.score >= 0 ? '#4f46e5' : '#ef4444'), 
                            borderRadius: 6 
                        }]
                    },
                    options: { 
                        indexAxis: 'y', 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    }
                });
                return () => chartInstance.current?.destroy();
            }, [data]);
            return <div className="h-[350px] w-full"><canvas ref={canvasRef}></canvas></div>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [status, setStatus] = useState('initializing'); 
            const [diagnostics, setDiagnostics] = useState({
                auth: 'pending',
                firestore: 'pending',
                error: null
            });
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [employees, setEmployees] = useState([]);
            const [reasons, setReasons] = useState([]);
            const [points, setPoints] = useState([]);
            const [logs, setLogs] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState(`${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`);
            const [selectedEmployeeId, setSelectedEmployeeId] = useState(null);

            const [empForm, setEmpForm] = useState("");
            const [reasonForm, setReasonForm] = useState({ text: "", value: 0 });
            const [pointForm, setPointForm] = useState({ empId: "", reasonId: "", admin: "", notes: "" });

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'employee-dash-production';

            // 1. Connection Logic (Following Rule 3 - Auth First)
            useEffect(() => {
                const config = {
                    apiKey: "AIzaSyDVxpbTHTvMCZR8tkbqVvUbhAKGTmSkL_g",
                    authDomain: "employee-dashboard-2.firebaseapp.com",
                    projectId: "employee-dashboard-2",
                    storageBucket: "employee-dashboard-2.firebasestorage.app",
                    messagingSenderId: "986398601231",
                    appId: "1:986398601231:web:1a6d9c9b171ea8236337a"
                };

                const setup = async () => {
                    const fb = initFirebaseInstance(config);
                    const authInstance = fb.auth;

                    try {
                        // FIX: Rule 3 Compliance - Try custom token first, BUT guard against mismatch error
                        // If token exists but fails (e.g. env mismatch), we MUST fallback to anonymous immediately
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await authInstance.signInWithCustomToken(__initial_auth_token);
                            } catch (tokenErr) {
                                console.warn("Custom token failed (mismatch likely), falling back to anonymous:", tokenErr);
                                await authInstance.signInAnonymously();
                            }
                        } else {
                            await authInstance.signInAnonymously();
                        }
                        
                        // Set up listener for auth state changes
                        const unsubscribe = authInstance.onAuthStateChanged((u) => {
                            if (u) {
                                setDiagnostics(prev => ({ ...prev, auth: 'success' }));
                                setUser(u);
                                setStatus('ready');
                            }
                        });
                        return () => unsubscribe();
                    } catch (err) {
                        console.error("Auth Initialization Error:", err);
                        setDiagnostics(prev => ({ ...prev, auth: 'failed', error: err.message }));
                        setStatus('error');
                    }
                };

                setup();
            }, []);

            // 2. Data Logic (Following Rule 1 - Path Structure)
            useEffect(() => {
                // Rule 3 Guard
                if (!user) return;
                
                const fbDb = firebase.firestore();
                // Rule 1: Mandatory Path structure
                const getColl = (name) => fbDb.collection('artifacts').doc(appId).collection('public').doc('data').collection(name);
                
                const unsubscribers = [];

                const safeSync = (collName, setter) => {
                    try {
                        const unsub = getColl(collName).onSnapshot(
                            s => {
                                setDiagnostics(prev => ({ ...prev, firestore: 'success' }));
                                setter(s.docs.map(d => ({ id: d.id, ...d.data() })));
                            },
                            err => {
                                console.error(`${collName} sync error:`, err);
                                if (err.code === 'permission-denied') {
                                    setDiagnostics(prev => ({ 
                                        ...prev, 
                                        firestore: 'failed', 
                                        error: "Permission Denied. Please ensure Firestore rules allow access to /artifacts/" + appId + "/public/data/" 
                                    }));
                                    setStatus('error');
                                }
                            }
                        );
                        unsubscribers.push(unsub);
                    } catch (e) {
                        console.error(e);
                    }
                };

                safeSync('employees', setEmployees);
                safeSync('reasons', setReasons);
                
                const unsubPoints = getColl('points').onSnapshot(s => {
                    const d = s.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // Rule 2: Sorting in memory
                    setPoints(d.sort((a,b) => (b.timestamp?.seconds||0)-(a.timestamp?.seconds||0)));
                }, err => console.error(err));
                unsubscribers.push(unsubPoints);

                const unsubLogs = getColl('change_logs').onSnapshot(s => {
                    const d = s.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setLogs(d.sort((a,b) => (b.timestamp?.seconds||0)-(a.timestamp?.seconds||0)));
                }, err => console.error(err));
                unsubscribers.push(unsubLogs);

                return () => unsubscribers.forEach(fn => fn());
            }, [user, appId]);

            const logAction = async (action, details, admin) => {
                if (!user) return;
                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('change_logs').add({
                    action, details, admin: admin || "Admin", timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const addEmployee = async (e) => {
                e.preventDefault();
                if (!user || !empForm.trim()) return;
                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('employees').add({
                    name: empForm.trim(), timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                await logAction("Employee Added", `Added ${empForm}`, "Admin");
                setEmpForm("");
            };

            const assignPoint = async (e) => {
                e.preventDefault();
                if (!user) return;
                const emp = employees.find(e => e.id === pointForm.empId);
                const reas = reasons.find(r => r.id === pointForm.reasonId);
                if (!emp || !reas) return;
                await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('points').add({
                    employeeId: emp.id, employeeName: emp.name, reasonText: reas.text,
                    value: Number(reas.value), admin: pointForm.admin, notes: pointForm.notes,
                    monthKey: selectedMonth, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                await logAction("Points Assigned", `${reas.value >= 0 ? '+' : ''}${reas.value} to ${emp.name}`, pointForm.admin);
                setPointForm({ empId: "", reasonId: "", admin: pointForm.admin, notes: "" });
            };

            const stats = useMemo(() => {
                const f = points.filter(p => p.monthKey === selectedMonth);
                return { 
                    pos: f.filter(p => p.value > 0).reduce((a,b)=>a+b.value,0), 
                    neg: f.filter(p => p.value < 0).reduce((a,b)=>a+b.value,0), 
                    total: f.length 
                };
            }, [points, selectedMonth]);

            const leaderboardData = useMemo(() => {
                const m = {};
                employees.forEach(e => m[e.id] = { name: e.name, score: 0 });
                points.filter(p => p.monthKey === selectedMonth).forEach(p => { if (m[p.employeeId]) m[p.employeeId].score += p.value; });
                return Object.values(m).sort((a,b) => b.score - a.score);
            }, [employees, points, selectedMonth]);

            const trends = useMemo(() => {
                if (!selectedEmployeeId) return [];
                const d = {};
                points.filter(p => p.employeeId === selectedEmployeeId).forEach(p => {
                    if (!p.timestamp) return;
                    const date = p.timestamp.toDate().toLocaleDateString();
                    if (!d[date]) d[date] = { date, total: 0 };
                    d[date].total += p.value;
                });
                return Object.values(d).reverse();
            }, [points, selectedEmployeeId]);

            if (status !== 'ready') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 bg-slate-900 text-white text-center">
                        <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-8"></div>
                        <h2 className="text-2xl font-bold mb-2">Connecting to Data Cloud</h2>
                        <p className="text-slate-400 mb-12">Checking environment and auth tokens...</p>
                        
                        <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 max-w-2xl w-full text-left">
                            <h3 className="text-sm font-bold uppercase tracking-widest text-slate-500 mb-4">Diagnostics</h3>
                            <div className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <span className="text-sm">Secure Authentication</span>
                                    <span className={`text-xs font-bold px-2 py-1 rounded ${diagnostics.auth === 'success' ? 'bg-green-500/20 text-green-400' : diagnostics.auth === 'failed' ? 'bg-red-500/20 text-red-400' : 'bg-slate-700 text-slate-400'}`}>
                                        {diagnostics.auth.toUpperCase()}
                                    </span>
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className="text-sm">Firestore Permission</span>
                                    <span className={`text-xs font-bold px-2 py-1 rounded ${diagnostics.firestore === 'success' ? 'bg-green-500/20 text-green-400' : diagnostics.firestore === 'failed' ? 'bg-red-500/20 text-red-400' : 'bg-slate-700 text-slate-400'}`}>
                                        {diagnostics.firestore.toUpperCase()}
                                    </span>
                                </div>
                                
                                {diagnostics.error && (
                                    <div className="mt-4 p-4 bg-red-900/30 border border-red-800/50 rounded-xl">
                                        <p className="text-xs text-red-300 font-mono mb-4">Error: {diagnostics.error}</p>
                                        <div className="p-3 bg-black/40 rounded border border-white/10">
                                            <p className="text-[10px] text-gray-400 uppercase font-bold mb-2 tracking-tight">Required Firestore Rules:</p>
                                            <pre className="text-[10px] text-indigo-300 overflow-x-auto whitespace-pre">
{`service cloud.firestore {
  match /databases/{database}/documents {
    match /artifacts/${appId}/{document=**} {
      allow read, write: if request.auth != null;
    }
  }
}`}
                                            </pre>
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            <div className="mt-6 border-t border-slate-700 pt-6">
                                <p className="text-xs text-slate-400 mb-4 italic">Action Required: If auth/custom-token-mismatch occurs, ensure Anonymous login is enabled as a fallback in Firebase Console.</p>
                                <button onClick={() => window.location.reload()} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg font-bold transition-all">Retry Connection</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-64 bg-white border-r flex flex-col p-6 shadow-sm shrink-0">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg"><Icon name="award" size={24} /></div>
                            <span className="text-xl font-bold tracking-tight">TeamPulse</span>
                        </div>
                        <nav className="flex-1 space-y-1">
                            {[
                                {id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard'},
                                {id: 'assign', label: 'Assign Points', icon: 'plus-circle'},
                                {id: 'team', label: 'Employees', icon: 'users'},
                                {id: 'settings', label: 'Library', icon: 'settings'},
                                {id: 'changelog', label: 'Activity Log', icon: 'history'}
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 p-3 px-4 rounded-xl transition-all ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'text-gray-500 hover:bg-gray-100'}`}>
                                    <Icon name={item.icon} size={18} />
                                    <span className="font-semibold text-sm">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-8 bg-gray-50">
                        <header className="flex justify-between items-center mb-8">
                            <h1 className="text-2xl font-black text-gray-900 capitalize">{activeTab.replace('changelog', 'Activity Log')}</h1>
                            <div className="bg-white p-2 px-4 rounded-xl border flex items-center gap-2">
                                <Icon name="calendar" size={16} className="text-indigo-500"/>
                                <select className="bg-transparent text-sm font-bold outline-none cursor-pointer" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
                                    {[0,1,2,3,4,5].map(i => {
                                        const d = new Date(); d.setMonth(d.getMonth()-i);
                                        const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                                        return <option key={k} value={k}>{d.toLocaleString('default',{month:'long',year:'numeric'})}</option>
                                    })}
                                </select>
                            </div>
                        </header>

                        <div className="animate-fade-in max-w-6xl mx-auto">
                            {activeTab === 'dashboard' && (
                                <div className="space-y-6">
                                    <div className="grid grid-cols-3 gap-6">
                                        <div className="bg-white p-6 rounded-2xl border shadow-sm"><p className="text-xs font-bold text-gray-400 uppercase mb-1">Positive</p><h3 className="text-3xl font-black text-green-600">+{stats.pos}</h3></div>
                                        <div className="bg-white p-6 rounded-2xl border shadow-sm"><p className="text-xs font-bold text-gray-400 uppercase mb-1">Negative</p><h3 className="text-3xl font-black text-red-600">{stats.neg}</h3></div>
                                        <div className="bg-white p-6 rounded-2xl border shadow-sm"><p className="text-xs font-bold text-gray-400 uppercase mb-1">Actions</p><h3 className="text-3xl font-black text-indigo-600">{stats.total}</h3></div>
                                    </div>
                                    <div className="bg-white p-8 rounded-2xl border shadow-sm">
                                        <h2 className="font-bold mb-6 text-lg flex items-center gap-2"><Icon name="bar-chart" className="text-indigo-500"/> Monthly Leaderboard</h2>
                                        <LeaderboardChart data={leaderboardData} />
                                    </div>
                                </div>
                            )}

                            {activeTab === 'assign' && (
                                <div className="max-w-xl mx-auto bg-white p-10 rounded-3xl border shadow-sm">
                                    <h2 className="text-xl font-bold mb-6">Assign Interaction</h2>
                                    <form onSubmit={assignPoint} className="space-y-4">
                                        <select className="w-full p-3 bg-gray-50 border rounded-xl" value={pointForm.empId} onChange={e => setPointForm({...pointForm, empId: e.target.value})} required>
                                            <option value="">Target Employee...</option>
                                            {employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                                        </select>
                                        <select className="w-full p-3 bg-gray-50 border rounded-xl" value={pointForm.reasonId} onChange={e => setPointForm({...pointForm, reasonId: e.target.value})} required>
                                            <option value="">Interaction Reason...</option>
                                            {reasons.map(r => <option key={r.id} value={r.id}>{r.text} ({r.value})</option>)}
                                        </select>
                                        <input className="w-full p-3 bg-gray-50 border rounded-xl" placeholder="Your Name (Admin)" value={pointForm.admin} onChange={e => setPointForm({...pointForm, admin: e.target.value})} required />
                                        <textarea className="w-full p-3 bg-gray-50 border rounded-xl" placeholder="Notes..." rows="3" value={pointForm.notes} onChange={setPointForm ? (e => setPointForm({...pointForm, notes: e.target.value})) : undefined} />
                                        <button className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-100 transition-all hover:bg-indigo-700">Assign Interaction</button>
                                    </form>
                                </div>
                            )}

                            {activeTab === 'team' && (
                                <div className="grid grid-cols-3 gap-6">
                                    <div className="col-span-1 space-y-4">
                                        <form onSubmit={addEmployee} className="flex gap-2"><input className="flex-1 border p-3 rounded-xl" placeholder="Add Name..." value={empForm} onChange={e => setEmpForm(e.target.value)} required/><button className="bg-indigo-600 text-white px-4 rounded-xl"><Icon name="plus" size={18}/></button></form>
                                        <div className="bg-white rounded-xl border overflow-hidden divide-y max-h-[500px] overflow-y-auto custom-scrollbar">
                                            {employees.length === 0 ? <div className="p-4 text-center text-gray-400 text-sm italic">No employees yet</div> :
                                            employees.map(e => <button key={e.id} onClick={() => setSelectedEmployeeId(e.id)} className={`w-full text-left p-4 transition-all hover:bg-gray-50 ${selectedEmployeeId === e.id ? 'bg-indigo-50 border-r-4 border-indigo-600 font-bold text-indigo-700' : ''}`}>{e.name}</button>)}
                                        </div>
                                    </div>
                                    <div className="col-span-2 bg-white p-8 rounded-2xl border shadow-sm min-h-[400px]">
                                        {selectedEmployeeId ? (
                                            <div>
                                                <div className="flex justify-between mb-8 items-center border-b pb-4">
                                                    <h2 className="text-2xl font-black">{employees.find(e => e.id === selectedEmployeeId)?.name}</h2>
                                                    <button onClick={async () => { if(confirm("Delete employee?")){ await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('employees').doc(selectedEmployeeId).delete(); setSelectedEmployeeId(null); } }} className="text-gray-300 hover:text-red-500"><Icon name="trash-2" size={20}/></button>
                                                </div>
                                                <TrendChart data={trends} />
                                            </div>
                                        ) : <div className="h-full flex flex-col items-center justify-center text-gray-400 italic"><Icon name="user" size={48} className="mb-2 opacity-20"/>Select an employee profile</div>}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="max-w-2xl mx-auto space-y-6">
                                    <div className="bg-white p-8 rounded-2xl border shadow-sm">
                                        <h3 className="font-bold mb-4 flex items-center gap-2"><Icon name="list" className="text-indigo-500"/> Reason Library</h3>
                                        <div className="flex gap-2">
                                            <input className="flex-[3] border p-3 rounded-xl bg-gray-50" placeholder="Reason Title" value={reasonForm.text} onChange={e => setReasonForm({...reasonForm, text: e.target.value})}/>
                                            <input className="flex-1 border p-3 rounded-xl bg-gray-50" type="number" placeholder="Pts" value={reasonForm.value} onChange={e => setReasonForm({...reasonForm, value: e.target.value})}/>
                                            <button onClick={async () => { if(!reasonForm.text) return; await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('reasons').add({...reasonForm, value: Number(reasonForm.value)}); setReasonForm({text:"", value:0}); }} className="bg-indigo-600 text-white px-6 rounded-xl font-bold">Add</button>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-xl border divide-y overflow-hidden shadow-sm max-h-[400px] overflow-y-auto custom-scrollbar">
                                        {reasons.length === 0 ? <div className="p-4 text-center text-gray-400 italic">No reasons configured</div> :
                                        reasons.map(r => <div key={r.id} className="p-4 flex justify-between items-center hover:bg-gray-50"><span>{r.text} <b className={r.value >=0 ? 'text-green-600' : 'text-red-600'}>({r.value})</b></span><button onClick={() => firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('reasons').doc(r.id).delete()} className="text-gray-300 hover:text-red-500"><Icon name="trash" size={16}/></button></div>)}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'changelog' && (
                                <div className="max-w-4xl mx-auto bg-white rounded-2xl border overflow-hidden shadow-sm">
                                    <div className="p-4 bg-gray-50 border-b flex items-center justify-between font-bold text-gray-700">Recent Activity</div>
                                    <div className="divide-y max-h-[600px] overflow-y-auto custom-scrollbar">
                                        {logs.length === 0 ? <div className="p-12 text-center text-gray-400 italic">No activity recorded</div> :
                                        logs.map(log => (
                                            <div key={log.id} className="p-4 px-6 flex justify-between items-center hover:bg-gray-50">
                                                <div><p className="font-bold text-gray-800">{log.action}</p><p className="text-sm text-gray-500">{log.details}</p></div>
                                                <div className="text-right text-xs text-gray-400 font-medium">
                                                    <p className="text-gray-600">{log.admin}</p>
                                                    <p>{log.timestamp?.toDate().toLocaleTimeString()}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
