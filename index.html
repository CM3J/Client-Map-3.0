<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Points Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js (More reliable for CDN use than Recharts) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDVxpbThTvMCZR8tkbqVvUbhAKGTmSkl_g",
                authDomain: "employee-dashboard-2.firebaseapp.com",
                projectId: "employee-dashboard-2",
                storageBucket: "employee-dashboard-2.firebasestorage.app",
                messagingSenderId: "986398601231",
                appId: "1:986398601231:web:1a6d9c9b171ea8236337a"
            };

        // Initialize Firebase once
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'employee-dashboard-prod';

        // Helper for Lucide Icons
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: { size, class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <i data-lucide={name} ref={iconRef}></i>;
        };

        // --- UTILS ---
        const formatMonthKey = (date = new Date()) => {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        };

        const getMonthDisplay = (key) => {
            if (!key) return '';
            const [year, month] = key.split('-');
            return new Date(year, month - 1).toLocaleString('default', { month: 'long', year: 'numeric' });
        };

        // --- COMPONENTS ---
        const TrendChart = ({ data }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !data.length) return;

                if (chartRef.current) chartRef.current.destroy();

                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.date),
                        datasets: [
                            {
                                label: 'Net Points',
                                data: data.map(d => d.total),
                                borderColor: '#4f46e5',
                                backgroundColor: 'rgba(79, 70, 229, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3
                            },
                            {
                                label: 'Positive',
                                data: data.map(d => d.pos),
                                borderColor: '#10b981',
                                borderDash: [5, 5],
                                tension: 0.4
                            },
                            {
                                label: 'Negative',
                                data: data.map(d => d.neg),
                                borderColor: '#ef4444',
                                borderDash: [5, 5],
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'top' } },
                        scales: { y: { beginAtZero: true } }
                    }
                });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data]);

            return <div className="h-[300px] w-full"><canvas ref={canvasRef}></canvas></div>;
        };

        const LeaderboardChart = ({ data }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current || !data.length) return;
                if (chartRef.current) chartRef.current.destroy();

                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.name),
                        datasets: [{
                            label: 'Monthly Points',
                            data: data.map(d => d.score),
                            backgroundColor: data.map(d => d.score >= 0 ? '#4f46e5' : '#ef4444'),
                            borderRadius: 8
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { grid: { display: false } } }
                    }
                });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data]);

            return <div className="h-[400px] w-full"><canvas ref={canvasRef}></canvas></div>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [employees, setEmployees] = useState([]);
            const [reasons, setReasons] = useState([]);
            const [points, setPoints] = useState([]);
            const [logs, setLogs] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState(formatMonthKey());
            const [selectedEmployeeId, setSelectedEmployeeId] = useState(null);

            // Form States
            const [empForm, setEmpForm] = useState("");
            const [reasonForm, setReasonForm] = useState({ text: "", value: 0 });
            const [pointForm, setPointForm] = useState({ empId: "", reasonId: "", admin: "", notes: "" });

            // Initialization (Rule 3: Auth first)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) { 
                        console.error("Auth Error", err); 
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // Data Subscriptions (Rule 1: Path structure)
            useEffect(() => {
                if (!user) return;

                // Mandatory Path: /artifacts/{appId}/public/data/{collectionName}
                const getCollection = (collName) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collName);

                const unsubEmp = getCollection('employees').onSnapshot(snap => {
                    setEmployees(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, err => console.error("Snapshot Error (Employees):", err));

                const unsubReason = getCollection('reasons').onSnapshot(snap => {
                    setReasons(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, err => console.error("Snapshot Error (Reasons):", err));

                const unsubPoints = getCollection('points').onSnapshot(snap => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    // Rule 2: Sorting in JS memory
                    data.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    setPoints(data);
                }, err => console.error("Snapshot Error (Points):", err));

                const unsubLogs = getCollection('change_logs').onSnapshot(snap => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    data.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    setLogs(data);
                }, err => console.error("Snapshot Error (Logs):", err));

                return () => { unsubEmp(); unsubReason(); unsubPoints(); unsubLogs(); };
            }, [user]);

            // Actions
            const logAction = async (action, details, admin) => {
                if (!user) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('change_logs').add({
                    action, details, admin: admin || "Admin", timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            };

            const addEmployee = async (e) => {
                e.preventDefault();
                if (!user || !empForm.trim()) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('employees').add({
                    name: empForm.trim(), createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await logAction("Employee Added", `Added ${empForm}`, "System");
                setEmpForm("");
            };

            const assignPoint = async (e) => {
                e.preventDefault();
                if (!user) return;
                const emp = employees.find(e => e.id === pointForm.empId);
                const reas = reasons.find(r => r.id === pointForm.reasonId);
                if (!emp || !reas) return;

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('points').add({
                    employeeId: emp.id, employeeName: emp.name, reasonId: reas.id, reasonText: reas.text,
                    value: Number(reas.value), admin: pointForm.admin, notes: pointForm.notes,
                    monthKey: formatMonthKey(), timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                await logAction("Points Assigned", `${reas.value > 0 ? '+' : ''}${reas.value} to ${emp.name}`, pointForm.admin);
                setPointForm({ empId: "", reasonId: "", admin: pointForm.admin, notes: "" });
            };

            const stats = useMemo(() => {
                const monthPoints = points.filter(p => p.monthKey === selectedMonth);
                const positive = monthPoints.filter(p => p.value > 0).reduce((acc, curr) => acc + curr.value, 0);
                const negative = monthPoints.filter(p => p.value < 0).reduce((acc, curr) => acc + curr.value, 0);
                return { positive, negative, total: monthPoints.length };
            }, [points, selectedMonth]);

            const leaderboardData = useMemo(() => {
                const totals = {};
                employees.forEach(e => totals[e.id] = { name: e.name, score: 0 });
                points.filter(p => p.monthKey === selectedMonth).forEach(p => {
                    if (totals[p.employeeId]) totals[p.employeeId].score += p.value;
                });
                return Object.values(totals).sort((a, b) => b.score - a.score);
            }, [employees, points, selectedMonth]);

            const employeeTrends = useMemo(() => {
                if (!selectedEmployeeId) return [];
                const daily = {};
                points.filter(p => p.employeeId === selectedEmployeeId).forEach(p => {
                    if (!p.timestamp) return;
                    const dateStr = p.timestamp.toDate().toLocaleDateString();
                    if (!daily[dateStr]) daily[dateStr] = { date: dateStr, pos: 0, neg: 0, total: 0 };
                    if (p.value > 0) daily[dateStr].pos += p.value;
                    else daily[dateStr].neg += Math.abs(p.value);
                    daily[dateStr].total += p.value;
                });
                return Object.values(daily).reverse();
            }, [points, selectedEmployeeId]);

            return (
                <div className="flex h-screen bg-gray-50 overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 bg-white border-r flex flex-col p-6 shrink-0">
                        <div className="flex items-center gap-3 mb-10 px-2">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white">
                                <Icon name="award" size={24} />
                            </div>
                            <span className="text-xl font-bold text-gray-800">TeamPulse</span>
                        </div>
                        <nav className="flex-1 space-y-2">
                            {['dashboard', 'assign', 'team', 'settings', 'changelog'].map(id => (
                                <button key={id} onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 p-3 px-4 rounded-lg capitalize ${activeTab === id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'text-gray-500 hover:bg-gray-100'}`}>
                                    <Icon name={id === 'dashboard' ? 'layout-dashboard' : id === 'assign' ? 'plus' : id === 'team' ? 'users' : id === 'settings' ? 'settings' : 'history'} size={20} />
                                    {id === 'changelog' ? 'Change Log' : id}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 overflow-y-auto p-8 pt-6">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900 capitalize">{activeTab.replace('_', ' ')}</h1>
                                <p className="text-gray-500 text-sm">Real-time team performance management</p>
                            </div>
                            <div className="flex items-center gap-4 bg-white p-2 px-3 rounded-xl border shadow-sm">
                                <Icon name="calendar" size={18} className="text-indigo-500" />
                                <select className="bg-transparent border-none text-sm font-medium text-gray-700 outline-none" value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)}>
                                    {[0, 1, 2, 3, 4, 5].map(i => {
                                        const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i);
                                        const key = formatMonthKey(d);
                                        return <option key={key} value={key}>{getMonthDisplay(key)}</option>;
                                    })}
                                </select>
                            </div>
                        </header>

                        {!user ? (
                            <div className="flex flex-col items-center justify-center h-[60vh] gap-4">
                                <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                <p className="text-gray-500 font-medium">Syncing with Firebase...</p>
                            </div>
                        ) : (
                            <div className="animate-fade-in">
                                {activeTab === 'dashboard' && (
                                    <div className="space-y-8">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                                <p className="text-gray-500 text-sm font-medium">Positive Interactions</p>
                                                <h3 className="text-3xl font-bold text-green-600 mt-1">+{stats.positive}</h3>
                                            </div>
                                            <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                                <p className="text-gray-500 text-sm font-medium">Negative Flags</p>
                                                <h3 className="text-3xl font-bold text-red-600 mt-1">{stats.negative}</h3>
                                            </div>
                                            <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                                <p className="text-gray-500 text-sm font-medium">Total Actions</p>
                                                <h3 className="text-3xl font-bold text-indigo-600 mt-1">{stats.total}</h3>
                                            </div>
                                        </div>
                                        <div className="bg-white p-8 rounded-2xl border shadow-sm">
                                            <h2 className="text-lg font-bold mb-6">Monthly Rankings</h2>
                                            <LeaderboardChart data={leaderboardData} />
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'assign' && (
                                    <div className="max-w-2xl mx-auto bg-white p-8 rounded-2xl border shadow-sm">
                                        <form onSubmit={assignPoint} className="space-y-6">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-2">
                                                    <label className="text-sm font-semibold">Employee</label>
                                                    <select className="w-full bg-gray-50 border p-3 rounded-xl outline-none focus:ring-2 ring-indigo-500" value={pointForm.empId} onChange={e => setPointForm({...pointForm, empId: e.target.value})} required>
                                                        <option value="">Select...</option>
                                                        {employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-sm font-semibold">Action</label>
                                                    <select className="w-full bg-gray-50 border p-3 rounded-xl outline-none focus:ring-2 ring-indigo-500" value={pointForm.reasonId} onChange={e => setPointForm({...pointForm, reasonId: e.target.value})} required>
                                                        <option value="">Select...</option>
                                                        {reasons.map(r => <option key={r.id} value={r.id}>{r.text} ({r.value > 0 ? '+' : ''}{r.value})</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <input type="text" placeholder="Your Name (Admin)" className="w-full bg-gray-50 border p-3 rounded-xl outline-none focus:ring-2 ring-indigo-500" value={pointForm.admin} onChange={e => setPointForm({...pointForm, admin: e.target.value})} required />
                                            <textarea placeholder="Notes..." rows="4" className="w-full bg-gray-50 border p-3 rounded-xl outline-none focus:ring-2 ring-indigo-500" value={pointForm.notes} onChange={e => setPointForm({...pointForm, notes: e.target.value})} />
                                            <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition-all">Submit Points</button>
                                        </form>
                                    </div>
                                )}

                                {activeTab === 'team' && (
                                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                                        <div className="xl:col-span-1 space-y-4">
                                            <form onSubmit={addEmployee} className="flex gap-2 mb-6">
                                                <input type="text" placeholder="Name" className="flex-1 border p-3 rounded-xl" value={empForm} onChange={e => setEmpForm(e.target.value)} />
                                                <button type="submit" className="bg-indigo-600 text-white p-3 px-4 rounded-xl">Add</button>
                                            </form>
                                            <div className="bg-white rounded-2xl border shadow-sm divide-y overflow-hidden">
                                                {employees.map(e => (
                                                    <button key={e.id} onClick={() => setSelectedEmployeeId(e.id)} className={`w-full text-left p-4 hover:bg-gray-50 flex justify-between ${selectedEmployeeId === e.id ? 'bg-indigo-50' : ''}`}>
                                                        <span className="font-bold">{e.name}</span>
                                                        <Icon name="chevron-right" size={16} className="text-gray-400" />
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="xl:col-span-2">
                                            {selectedEmployeeId ? (
                                                <div className="bg-white p-8 rounded-2xl border shadow-sm">
                                                    <h2 className="text-2xl font-bold mb-6">{employees.find(e => e.id === selectedEmployeeId)?.name}</h2>
                                                    <TrendChart data={employeeTrends} />
                                                </div>
                                            ) : (
                                                <div className="h-full border-2 border-dashed rounded-2xl flex items-center justify-center text-gray-400">Select an employee</div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'settings' && (
                                    <div className="max-w-2xl mx-auto space-y-8">
                                        <div className="bg-white p-8 rounded-2xl border shadow-sm">
                                            <h2 className="text-lg font-bold mb-4">Reason Library</h2>
                                            <div className="space-y-4">
                                                <input type="text" placeholder="Title" className="w-full border p-3 rounded-xl" value={reasonForm.text} onChange={e => setReasonForm({...reasonForm, text: e.target.value})} />
                                                <input type="number" placeholder="Points" className="w-full border p-3 rounded-xl" value={reasonForm.value} onChange={e => setReasonForm({...reasonForm, value: e.target.value})} />
                                                <button onClick={async () => {
                                                    if (!user) return;
                                                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reasons').add({...reasonForm, value: Number(reasonForm.value)});
                                                    setReasonForm({text: "", value: 0});
                                                }} className="w-full bg-green-600 text-white font-bold py-3 rounded-xl">Add to Library</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                
                                {activeTab === 'changelog' && (
                                    <div className="max-w-4xl mx-auto bg-white rounded-2xl border shadow-sm overflow-hidden">
                                        <div className="p-6 bg-gray-50 border-b font-bold">System Activity Log</div>
                                        <div className="divide-y max-h-[600px] overflow-y-auto">
                                            {logs.map(log => (
                                                <div key={log.id} className="p-4 px-6 flex justify-between items-start">
                                                    <div>
                                                        <p className="font-bold">{log.action}</p>
                                                        <p className="text-sm text-gray-500">{log.details}</p>
                                                    </div>
                                                    <div className="text-right text-xs text-gray-400">
                                                        <p>{log.admin}</p>
                                                        <p>{log.timestamp?.toDate().toLocaleString()}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
